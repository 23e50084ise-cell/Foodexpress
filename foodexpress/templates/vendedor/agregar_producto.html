{% extends "base.html" %}
{% block title %}Agregar Producto – FoodExpress{% endblock %}
{% block content %}
<div class="page-header">
    <a href="{{ url_for('vendedor_dashboard') }}" class="btn-back">← Panel</a>
    <h1>Agregar producto</h1>
</div>
<div class="form-page-wrap">
    <div class="form-card">
        <div class="form-puesto-ref">
            <span>🏪 {{ puesto.nombre }}</span>
        </div>
        <form method="POST" enctype="multipart/form-data" class="admin-form">
            <div class="form-group">
                <label>Nombre del producto</label>
                <input type="text" name="nombre" placeholder="Ej: Taco de pastor" required>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea name="descripcion" rows="2" placeholder="Ingredientes, estilo de preparación..."></textarea>
            </div>
            <div class="form-group">
                <label>Precio (MXN)</label>
                <div class="input-prefix-wrap">
                    <span class="input-prefix">$</span>
                    <input type="number" name="precio" min="0" step="0.50" placeholder="0.00" required>
                </div>
            </div>
            <div class="form-group">
                <label>Imagen del producto</label>
                <div class="file-upload-wrap">
                    <input type="file" name="imagen" accept="image/*" id="imgInput" onchange="previewImg(this)">
                    <label for="imgInput" class="file-upload-label">
                        <span id="fileLabel">📷 Seleccionar imagen</span>
                    </label>
                    <img id="imgPreview" class="img-preview hidden">
                </div>
            </div>
            <button type="submit" class="btn-primary btn-full">Agregar producto →</button>
        </form>
    </div>
</div>
<script>
function previewImg(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.getElementById('imgPreview');
            img.src = e.target.result;
            img.classList.remove('hidden');
            document.getElementById('fileLabel').textContent = '✅ ' + input.files[0].name;
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
